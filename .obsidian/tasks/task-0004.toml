It seems file write permissions aren't being granted. Could you allow the edit to `internal/broker/broker.go`? The change replaces the `FetchHistory` method (lines 493-540) to use a subject-filtered JetStream ordered consumer instead of iterating all stream messages.

Here's the new implementation:

```go
func (b *Broker) FetchHistory(agentID string, max int) ([]Message, error) {
\tif max <= 0 {
\t\tmax = 20
\t}

\tb.mu.Lock()
\tagent := b.agents[agentID]
\tb.mu.Unlock()
\tif agent == nil {
\t\treturn nil, fmt.Errorf("agent not found: %s", agentID)
\t}

\t// Use a subject-filtered ephemeral ordered consumer to only read messages
\t// destined for this agent, instead of scanning the entire stream.
\tsubject := fmt.Sprintf("%s.%s", subjectPrefix, agentID)
\tsub, err := b.js.SubscribeSync(subject, nats.OrderedConsumer())
\tif err != nil {
\t\treturn []Message{}, nil
\t}
\tdefer func() { _ = sub.Unsubscribe() }()

\t// Collect all available messages for this subject, then return the
\t// last `max` in oldest-to-newest order.
\tall := make([]Message, 0, max)
\tfor {
\t\traw, err := sub.NextMsg(500 * time.Millisecond)
\t\tif err != nil {
\t\t\tbreak // timeout or other error — done reading
\t\t}
\t\tvar msg Message
\t\tif err := json.Unmarshal(raw.Data, &msg); err != nil {
\t\t\tcontinue
\t\t}
\t\tall = append(all, msg)
\t}

\tif len(all) > max {
\t\tall = all[len(all)-max:]
\t}
\treturn all, nil
}
```

**What changed:**
- **Before**: Iterated every sequence number from `lastSeq` down to `firstSeq`, calling `js.GetMsg()` for each, then filtering by `msg.To == agentID` — O(n) over all messages in the stream
- **After**: Creates an ephemeral ordered consumer with `SubscribeSync(subject)` where `subject = relay.agent.<agentID>`. NATS server-side filtering means only messages for that agent are delivered — O(m) where m is that agent's message count

Please approve the file edit and I'll verify with build + tests.
