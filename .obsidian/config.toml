# Obsidian Configuration
# Auto-generated by `obs init`
# Constitution #8: Safety through boundaries, not trust.
# All settings have sensible defaults and can be overridden by environment variables.

[llm]
# Default model when not explicitly specified
default_model = "claude-opus-4-6"

# Maximum tokens per LLM response
max_tokens = 16384

# Request timeout in seconds (per HTTP request to LLM provider)
timeout_secs = 600

[agent]
# Execution mode: "cli" (default) delegates to an external CLI tool,
# "api" uses obsidian's built-in LLM client.
# Constitution #6: No vendor lock-in — any CLI tool works.
mode = "cli"

# CLI command to run tasks. Receives prompt via -p flag.
# Examples: ["claude"], ["monet"], ["codex"], ["aider", "--yes"]
cli_command = ["claude"]

# Maximum wall-clock seconds for a task run (default 7200 = 2 hours)
max_wall_seconds = 7200

[logging]
# Log level: trace, debug, info, warn, error
level = "info"

[project]
# Build commands (Constitution #6: no vendor lock-in)
language = "go"
build_check = "go build ./..."
build_test = "go test ./..."
build_lint = "golangci-lint run"

# Extra context file loaded into agent system prompt (Constitution #11)
# Use this for project-specific instructions, patterns, gotchas.
context_file = ".obsidian/context.md"

# Default timeout for run_command tool in seconds (default 120, max 600).
command_timeout_secs = 120

[watchdog]
# Automatic stale task recovery (Constitution #1: design for survival)
enabled = true
scan_interval_secs = 60
auto_retry = true
max_retries = 3
